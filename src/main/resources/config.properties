# ==============================================================================
# config.properties — Configuration de l'application de gestion de parking
# Remplissez ici vos paramètres de connexion réels.
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. Base de données MySQL
# ------------------------------------------------------------------------------
# Adresse du serveur de base de données (localhost = votre propre machine)
db.host=localhost

# Port par défaut de MySQL (généralement 3306)
db.port=3306

# Nom de la base de données créée pour l'application
db.name=parking_moto

# Identifiant de l'utilisateur MySQL qui a les droits sur cette base
db.user=root

# Mot de passe associé à cet utilisateur (Mettez le vôtre ici)
db.password=


# ------------------------------------------------------------------------------
# 2. Pool de Connexions (Performance & Résilience)
# ------------------------------------------------------------------------------
# Nombre minimum de connexions maintenues ouvertes simultanément vers la BDD
db.pool.minConnections=2

# Nombre maximum de connexions simultanées autorisées (évite de saturer MySQL)
db.pool.maxConnections=10

# Temps d'attente maximum (en millisecondes) pour obtenir une connexion avant de renvoyer une erreur (30000 ms = 30 secondes)
db.pool.connectionTimeout=30000


# ------------------------------------------------------------------------------
# 3. Règles de Tarification
# ------------------------------------------------------------------------------
# Prix de base par heure appliquée aux motos (ex: 1.00 € ou 1.00 $ par heure)
tarif.horaire=1.00

# Durée minimale de stationnement qui sera facturée (même si l'usager reste 10 minutes)
tarif.dureeMinimumMinutes=60


# ------------------------------------------------------------------------------
# 4. Informations générales sur le Parking
# ------------------------------------------------------------------------------
# Raison sociale / Nom commercial affiché sur l'application et les tickets
parking.nom=Parking Moto

# Adresse physique du parking (affichée sur l'entête des tickets imprimés)
parking.adresse=123 Rue de la Paix, Paris, France

# Numéro de contact du gestionnaire
parking.telephone=+33 6 12 34 56 78

# Capacité maximale du parking (utilisé pour bloquer les entrées si le parking est plein)
parking.nombrePlaces=50


# ------------------------------------------------------------------------------
# 5. Configuration des Tickets d'entrée
# ------------------------------------------------------------------------------
# Préfixe textuel qui commencera le numéro de chaque ticket (ex: TKT-0001)
ticket.prefixe=TKT

# Nombre de chiffres après le préfixe pour le compteur séquentiel (4 chiffres = de 0001 à 9999)
ticket.sequenceLength=4


# ------------------------------------------------------------------------------
# 6. Configuration de l'Imprimante Thermique (Tickets physiques)
# ------------------------------------------------------------------------------
# Port de communication matériel (ex: COM3 sous Windows ou /dev/ttyUSB0 sous Linux)
impression.port=

# Nombre maximal de caractères par ligne selon la largeur du rouleau de papier papier (souvent 32 ou 42)
impression.largeur=32

# Activer (true) ou désactiver (false) l'impression matérielle à chaque édition de ticket
impression.active=false


# ------------------------------------------------------------------------------
# 7. Paramètres de l'Interface Graphique (UI JavaFX)
# ------------------------------------------------------------------------------
# Largeur de la fenêtre principale au démarrage de l'application (en pixels)
ui.largeur=1280

# Hauteur de la fenêtre principale au démarrage (en pixels)
ui.hauteur=720

# Titre textuel affiché tout en haut de la fenêtre du logiciel
ui.titre=Parking Moto — Gestion

# Intervalle de rafraîchissement automatique du tableau de bord en millisecondes (5000 ms = 5 secondes)
ui.dashboard.refreshInterval=5000


# ------------------------------------------------------------------------------
# 8. Sécurité & Sessions utilisateurs
# ------------------------------------------------------------------------------
# Facteur de coût pour le hachage des mots de passe avec l'algorithme BCrypt (plus le chiffre est élevé, plus c'est sécurisé mais lent)
security.bcryptCost=12

# Durée de validité de la session d'un utilisateur (gérant) en minutes avant déconnexion automatique (480 min = 8 heures)
security.sessionTimeout=480


# ------------------------------------------------------------------------------
# 9. Sauvegardes automatisées (Anti-coupure / Sécurité)
# ------------------------------------------------------------------------------
# Chemin du dossier où seront stockés les fichiers de sauvegardes automatiques de la base de données
backup.repertoire=./backups

# Durée de conservation des fichiers de sauvegarde en jours avant suppression automatique (30 jours)
backup.retention=30<